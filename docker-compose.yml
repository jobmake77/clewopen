version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: clewopen-postgres
    environment:
      POSTGRES_DB: clewopen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clewopen-network

  redis:
    image: redis:7-alpine
    container_name: clewopen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clewopen-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clewopen-backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=clewopen
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - clewopen-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clewopen-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - clewopen-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  clewopen-network:
    driver: bridge
