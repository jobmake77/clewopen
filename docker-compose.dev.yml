version: '3.8'

services:
  # 只包含基础设施，前后端在本地运行
  postgres:
    image: postgres:15-alpine
    container_name: clewopen-postgres
    environment:
      POSTGRES_DB: clewopen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clewopen-network

  redis:
    image: redis:7-alpine
    container_name: clewopen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clewopen-network

volumes:
  postgres_data:
  redis_data:

networks:
  clewopen-network:
    driver: bridge
